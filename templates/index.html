<!DOCTYPE html>
<html>
<head>
    <title>Bookmark Categories</title>
</head>
<body>

    <h1>LocalBookmarks</h1>

    <nav>
        <a href="/add-category">Create Category</a> |
        <a href="/favorites-page">Favorites</a> 
    </nav>

    <hr>

    <h2> Categories </h2>

    <div id="categories"></div>

    <script>
        async function loadCategories() {
            const response = await fetch("/api/categories");
            const data = await response.json();

            let output = "";
            if (data.data.length === 0) {
                output = "<p>No categories found</p>";
            } else {
                data.data.forEach(category => {
                    output += `
                        <div>
                            <h3>
                                <a href="/category/${category.name}">
                                    ${category.name}
                                </a>
                            </h3>

                            <p>
                                Bookmarks: ${category.bookmark_count}
                            </p>

                            <button onclick="renameCategory('${category.id}', '${category.name}')">
                                Rename
                            </button>

                            <button onclick="deleteCategory('${category.id}', '${category.name}')">
                                Delete
                            </button>

                            <hr>

                        </div>
                    `;
                });
            }
            document.getElementById("categories").innerHTML = output;
        }

        async function renameCategory(id, currentName) {
            const newName = prompt("Enter new category name:", currentName);

            if (!newName || !newName.trim()) {
                return;
            }

            const response = await fetch(
                `/api/categories/${id}`,
                {
                    method: "PUT",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        name: newName
                    })
                }
            );

            const data = await response.json();
            alert(data.message);

            if (data.success) {
                loadCategories();
            }
        }

        async function deleteCategory(id, name) {
            const confirmed = confirm(
                `Delete category "${name}"?\n\nThis will also delete all bookmarks in this category.`
            );

            if (!confirmed) {
                return;
            }

            const response = await fetch(
                `/api/categories/${id}`,
                {
                    method: "DELETE"
                }
            );

            const data = await response.json();
            alert(data.message);
            if (data.success) {
                loadCategories();
            }
        }

        loadCategories();
    </script>
</body>
</html>
